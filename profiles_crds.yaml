apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sslprofiles.citrix.com
spec:
  group: citrix.com
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
      - name: Status
        type: string
        description: "Current Status of the CRD"
        jsonPath: .status.state
      - name: Message
        type: string
        description: "Status Message"
        jsonPath: .status.status_message
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
                type: object
                properties:
                  state:
                    type: string
                  status_message:
                    type: string
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "has(self.preconfigured) != has(self.config)"
                  message: "preconfigured and config are mutually exclusive fields. Please specify exactly one of them."
              properties:
                gatewayClassName:
                  type: string
                  description: "Name of the GatewayClass that this SSL profile should be applied to."
