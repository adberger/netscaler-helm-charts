                  items:
                    type: string
                    description: "Cipher suite, cipher group name"
                preconfigured:
                  type: string
                  description: "Mutually exclusive with 'config'. Name of a preconfigured, built-in SSL profile on the NetScaler to use."
                config:
                  type: object
