                      name:
                        type: string
                        description: "Name of the target resource."
                      namespace:
                        type: string
                        description: "Namespace of the target resource."
                      group:
                        type: string
                        description: "Group of the target resource."
                      kind:
                        type: string
                        description: "Kind of the target resource."
                      sectionName:
                        type: string
                        description: "Specific section within the target resource."
                sslciphers:
                  type: array
                  description: "List of ciphers to be bound to the ssl profile for the listener. Priority is as per the order in the list. A cipher suite, predefined cipher group or User created cipher group can be mentioned"
